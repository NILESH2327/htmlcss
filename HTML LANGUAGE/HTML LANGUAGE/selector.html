<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>css selector</title>
  <style>  
  p{
    border:2px solid lawngreen;/* element selector*/
  }
  }
  #redelement{
    color:greenyellow;
    background-color: black;/* id selector*/
  }

  }
  .cbv{
    color:navy;
    background-color: chartreuse;/* class selector*/
  }
  }
  span,footer{
    color:bisque;
    background-color: yellowgreen;/* grouping selector*/
  }
  </style>
</head>

<body>
  <h3>css selector</h3>
  <!-- here 4 type of css selector 1-element, 2-id,3-class,4-grouping -->
<p id ="redelement">here 4 type of css selector 1-element, 2-id,3-class,4-grouping</p>
<div>
  <p>this is second paragraph in div tagp</p>
  <span>we are doning color hotpink of span and footer</span>
</div>
<p class="cbv">my mood is kharab ab tu dekh ..kya karta hu</p>
<footer>this is footer</footer>
  
</body>
</html>
