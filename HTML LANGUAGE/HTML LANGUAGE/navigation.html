<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>navigation </title>
  <link rel="stylesheet"
          href="https://fonts.googleapis.com/css?family=Tangerine">
  <style>
.navbar{
  background-color: rgba(41, 28, 108, 0.62);
  border-radius: 14px;
}
.navbar ul{
  overflow: auto;
}
.navbar li{
  float:left;
  list-style:none;
  margin: 13px 20px;
 


}
.navbar li a{
  text-decoration: none;
  padding: 3px 3px;
  color:white ;
  
}
.navbar li a:hover{
  /* background-color: red; */
  color:red;
  }
.search{
  float :right;
  color:white;
  padding: 12px 70px;
}
.navbar input{
  padding: 3px;
  border: 2px solid black;
  border-radius: 12px;
  text-align: center;

}
p{
  font-family:'Tangerine', serif;
  font-size: 50px;
  text-align: center;
  color:rgb(208 11 184);
 

}
  </style>
</head>
<body>
  <header>
    <p>Welcome to my website </p>
    <nav class="navbar">
      
      <ul>
        <li><a href="#">Home</a> </li>
    <li><a href="#">About</a> </li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact us</a></li>
    <div class="search">
      <input type="text" name="search" id="search" placeholder="search on websiite">

    </div>
      </ul>
     
    </nav>
    
  </header>
  
</body>
</html>
